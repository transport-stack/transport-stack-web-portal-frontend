name: "Conventional Commits"

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
  workflow_call:

permissions:
  pull-requests: read

jobs:
  check-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            security
          requireScope: false
