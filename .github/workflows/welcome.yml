name: "Welcome New Contributors"

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]
  workflow_call:

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue on Transport Stack!

            Here's how to get started:
            - [Contributing Guide](https://github.com/transport-stack/.github/blob/main/CONTRIBUTING.md)
            - [Developer FAQ](https://github.com/transport-stack/.github/blob/main/profile/README.md)
            - [GitHub Discussions](https://github.com/orgs/transport-stack/discussions) — ask questions, share ideas
            - [Code of Conduct](https://github.com/transport-stack/.github/blob/main/CODE_OF_CONDUCT.md)

            A maintainer will review your issue shortly. To help us respond faster, make sure you've added:
            - A clear description of the problem or suggestion
            - Steps to reproduce (if it's a bug)
            - The repository and environment you're working with

          pr-message: |
            🎉 Thanks for your first Pull Request on Transport Stack!

            Before a maintainer reviews it, please check:
            - [ ] Your PR title follows [Conventional Commits](https://www.conventionalcommits.org/) (`feat:`, `fix:`, `docs:`, etc.)
            - [ ] You've filled out the PR template completely
            - [ ] You've added or updated tests if applicable
            - [ ] You've read the [Contributing Guide](https://github.com/transport-stack/.github/blob/main/CONTRIBUTING.md)

            A maintainer will review your PR within 3–5 business days. Thanks for contributing!
