name: "Close Stale Issues & PRs"

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
  workflow_call:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 90
          days-before-issue-close: 30
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,good first issue,help wanted"
          stale-issue-message: |
            This issue has been automatically marked as stale due to 90 days of inactivity.
            It will be closed in 30 days if no further activity occurs.
            If this is still relevant, please comment to keep it open.
          close-issue-message: |
            This issue has been automatically closed due to 120 days of inactivity.

          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-pr-label: "stale"
          exempt-pr-labels: "pinned,security,in progress"
          stale-pr-message: |
            This PR has been automatically marked as stale due to 60 days of inactivity.
            It will be closed in 14 days if no further activity occurs.
            Please update or reopen if this work is still in progress.
          close-pr-message: |
            This PR has been automatically closed due to inactivity.
